<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>リアルアイディア投票</title>
  <style>
    :root {
      --bg: #fbfbfb;
      --panel: rgba(255, 255, 255, 0.9);
      --line: #111111;
      --muted: #666666;
      --red: #d71920;
      --red-soft: rgba(215, 25, 32, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--line);
      background:
        radial-gradient(circle at top right, rgba(215, 25, 32, 0.08), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #fff8f8 40%, #fcfcfc 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, transparent 49.5%, rgba(215, 25, 32, 0.06) 50%, transparent 50.5%, transparent 100%),
        linear-gradient(0deg, transparent 0%, transparent 49.5%, rgba(0,0,0,0.03) 50%, transparent 50.5%, transparent 100%);
      background-size: 110px 110px;
      pointer-events: none;
      opacity: 0.45;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 18px 48px;
      position: relative;
      z-index: 1;
    }

    .hero {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 32px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: left;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -70px;
      top: -90px;
      border-radius: 50%;
      border: 1px solid rgba(215, 25, 32, 0.18);
      background: radial-gradient(circle, rgba(215, 25, 32, 0.10), transparent 70%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 760px;
    }

    .admin-panel {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr auto auto;
      gap: 12px;
      align-items: end;
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .field {
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 48px;
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 1rem;
      background: #fff;
      outline: none;
    }

    .field input:focus {
      box-shadow: 0 0 0 4px var(--red-soft);
    }

    .primary-btn,
    .secondary-btn,
    .vote-btn {
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .primary-btn,
    .secondary-btn {
      height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 2px solid var(--line);
      font-size: 0.98rem;
      font-weight: 700;
      background: #fff;
      color: var(--line);
      white-space: nowrap;
    }

    .primary-btn {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      box-shadow: 0 8px 22px rgba(215, 25, 32, 0.22);
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .vote-btn:hover {
      transform: translateY(-1px);
    }

    .summary {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin: 0 0 20px;
    }

    .summary-card {
      flex: 1 1 180px;
      min-width: 180px;
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      text-align: left;
    }

    .summary-card .label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .idea-card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 210px;
      position: relative;
      overflow: hidden;
    }

    .idea-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(215, 25, 32, 0.12), transparent 70%);
    }

    .idea-name {
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.4;
      word-break: break-word;
      text-align: left;
    }

    .vote-btn {
      width: 100%;
      padding: 16px 14px;
      font-size: 1.1rem;
      font-weight: 800;
      border: 2px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--line);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
    }

    .vote-btn:active {
      transform: scale(0.98);
    }

    .count-wrap {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
    }

    .count {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1;
    }

    .count-label {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .mini-btn {
      border: 1.5px solid var(--line);
      background: transparent;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .bottom-panels {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: left;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
    }

    #log {
      min-height: 120px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .bubble {
      display: inline-block;
      margin: 0 8px 10px 0;
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      animation: pop 0.25s ease;
      font-size: 0.93rem;
    }

    .muted {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.7;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 900px) {
      .admin-panel,
      .bottom-panels {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .wrap { padding: 16px 14px 32px; }
      .hero, .admin-panel, .panel { padding: 16px; }
      h1 { font-size: 2rem; }
      .summary-card .value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Real-time idea voting</div>
      <h1>未来アイディア<br />リアルタイム投票</h1>
      <p>
        発表を聞きながら、その場で投票ボタンを増やせる構成です。<br />
        例：秋山さんが3案出したら「秋山①」「秋山②」「秋山③」を一括追加できます。
      </p>
    </section>

    <section class="admin-panel">
      <div class="field">
        <label for="presenterName">発表者名</label>
        <input id="presenterName" type="text" placeholder="例：秋山" />
      </div>
      <div class="field">
        <label for="ideaCount">案の数</label>
        <input id="ideaCount" type="number" min="1" max="20" value="1" />
      </div>
      <button id="addIdeas" class="primary-btn">まとめて追加</button>
      <button id="reset" class="secondary-btn">票数だけリセット</button>
    </section>

    <section class="summary">
      <div class="summary-card">
        <div class="label">登録済みアイディア数</div>
        <div class="value" id="ideaTotal">0</div>
      </div>
      <div class="summary-card">
        <div class="label">総投票数</div>
        <div class="value" id="voteTotal">0</div>
      </div>
      <div class="summary-card">
        <div class="label">現在トップ</div>
        <div class="value" id="topIdea">-</div>
      </div>
    </section>

    <div id="buttons"></div>

    <section class="bottom-panels">
      <div class="panel">
        <h2>リアルタイムログ</h2>
        <div id="log"></div>
      </div>
      <div class="panel">
        <h2>この構成のポイント</h2>
        <div class="muted">
          ・固定人数配列ではなく、Firestoreの「voteOptions」コレクションからボタンを描画<br />
          ・その場で追加しても全端末に即反映<br />
          ・色は白ベース + 黒縁で統一し、アクセントだけ赤を使用<br />
          ・ログは画面表示用として残し、票数リセット時も消えません
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      addDoc,
      collection,
      doc,
      getDocs,
      getFirestore,
      increment,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp,
      updateDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const buttonsDiv = document.getElementById("buttons");
    const logDiv = document.getElementById("log");
    const presenterNameInput = document.getElementById("presenterName");
    const ideaCountInput = document.getElementById("ideaCount");
    const addIdeasBtn = document.getElementById("addIdeas");
    const resetBtn = document.getElementById("reset");

    const ideaTotalEl = document.getElementById("ideaTotal");
    const voteTotalEl = document.getElementById("voteTotal");
    const topIdeaEl = document.getElementById("topIdea");

    const voteOptionsRef = collection(db, "voteOptions");
    const voteOptionsQuery = query(voteOptionsRef, orderBy("order", "asc"));

    function createIdeaLabels(baseName, count) {
      return Array.from({ length: count }, (_, index) => `${baseName}${toCircledNumber(index + 1)}`);
    }

    function toCircledNumber(num) {
      const circled = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];
      return circled[num - 1] || `-${num}`;
    }

    async function addIdeas() {
      const presenter = presenterNameInput.value.trim();
      const count = Number(ideaCountInput.value || 0);

      if (!presenter) {
        alert("発表者名を入力してください。");
        presenterNameInput.focus();
        return;
      }

      if (!count || count < 1) {
        alert("案の数は1以上にしてください。");
        ideaCountInput.focus();
        return;
      }

      addIdeasBtn.disabled = true;

      try {
        const snapshot = await getDocs(voteOptionsQuery);
        let baseOrder = snapshot.size;
        const labels = createIdeaLabels(presenter, count);

        for (const label of labels) {
          await addDoc(voteOptionsRef, {
            label,
            presenter,
            count: 0,
            order: baseOrder++,
            createdAt: serverTimestamp()
          });
          appendLog(`追加: ${label}`);
        }

        presenterNameInput.value = "";
        ideaCountInput.value = 1;
      } catch (error) {
        console.error(error);
        alert("アイディア追加に失敗しました。");
      } finally {
        addIdeasBtn.disabled = false;
      }
    }

    function appendLog(text) {
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      logDiv.appendChild(bubble);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function renderIdeas(docs) {
      buttonsDiv.innerHTML = "";

      let totalVotes = 0;
      let topIdea = null;

      docs.forEach((ideaDoc) => {
        const data = ideaDoc.data();
        const count = data.count || 0;
        totalVotes += count;

        if (!topIdea || count > topIdea.count) {
          topIdea = { label: data.label, count };
        }

        const card = document.createElement("div");
        card.className = "idea-card";

        const name = document.createElement("div");
        name.className = "idea-name";
        name.textContent = data.label;

        const voteBtn = document.createElement("button");
        voteBtn.className = "vote-btn";
        voteBtn.textContent = "この案に投票";
        voteBtn.addEventListener("click", async () => {
          try {
            await updateDoc(doc(db, "voteOptions", ideaDoc.id), { count: increment(1) });
            appendLog(`投票: ${data.label}`);
          } catch (error) {
            console.error(error);
            alert("投票に失敗しました。");
          }
        });

        const countWrap = document.createElement("div");
        countWrap.className = "count-wrap";
        countWrap.innerHTML = `
          <div>
            <div class="count">${count}</div>
            <div class="count-label">votes</div>
          </div>
        `;

        const actions = document.createElement("div");
        actions.className = "card-actions";
        const miniInfo = document.createElement("button");
        miniInfo.className = "mini-btn";
        miniInfo.type = "button";
        miniInfo.textContent = data.presenter || "idea";
        actions.appendChild(miniInfo);

        card.appendChild(name);
        card.appendChild(voteBtn);
        card.appendChild(countWrap);
        card.appendChild(actions);
        buttonsDiv.appendChild(card);
      });

      ideaTotalEl.textContent = docs.length;
      voteTotalEl.textContent = totalVotes;
      topIdeaEl.textContent = topIdea ? `${topIdea.label} (${topIdea.count})` : "-";
    }

    onSnapshot(voteOptionsQuery, (snapshot) => {
      renderIdeas(snapshot.docs);
    });

    addIdeasBtn.addEventListener("click", addIdeas);

    presenterNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addIdeas();
    });

    ideaCountInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addIdeas();
    });

    resetBtn.addEventListener("click", async () => {
      if (!confirm("票数だけを0に戻します。よろしいですか？")) return;

      try {
        const snapshot = await getDocs(voteOptionsQuery);
        const batch = writeBatch(db);

        snapshot.forEach((item) => {
          batch.update(item.ref, { count: 0 });
        });

        await batch.commit();
        appendLog("票数をリセットしました");
      } catch (error) {
        console.error(error);
        alert("リセットに失敗しました。");
      }
    });
  </script>
</body>
</html>
